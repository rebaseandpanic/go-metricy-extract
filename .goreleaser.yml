version: 2

project_name: go-metricy-extract

before:
  hooks:
    - go mod tidy

builds:
  - id: go-metricy-extract
    main: ./cmd/go-metricy-extract
    binary: go-metricy-extract
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    # Inject version into main.version via ldflags.
    # {{ .Version }} strips the leading "v" from the git tag — tag v0.4.0 → "0.4.0".
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: go-metricy-extract
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: rebaseandpanic
    name: go-metricy-extract
  draft: false
  prerelease: auto
  header: |
    ## go-metricy-extract {{ .Tag }}

    See [CHANGELOG.md](https://github.com/rebaseandpanic/go-metricy-extract/blob/main/CHANGELOG.md) for details.

    ### Install

    ```bash
    go install github.com/rebaseandpanic/go-metricy-extract/cmd/go-metricy-extract@{{ .Tag }}
    ```

    Or download the prebuilt binary for your platform below.

snapshot:
  version_template: "{{ incpatch .Version }}-dev"
